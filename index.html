<body>
<header>
  <div class="head-top">
    <div class="brand">
      <span class="wordmark">spread<b>4</b>notes</span>
      <span class="credit">creado por Juan D. Arango · <a class="clink" href="https://juandarango.com" target="_blank" rel="noopener noreferrer">juandarango.com</a> · <a class="clink ig" href="https://instagram.com/juan.aol" target="_blank" rel="noopener noreferrer" aria-label="Instagram @juan.aol"><svg class="igico" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1.3" fill="currentColor" stroke="none"/></svg>@juan.aol</a></span>
