<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b1e22">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="spread4notes">
<title>spread4notes — transcripción y estudio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="head-top">
    <span class="wordmark">spread<b>4</b>notes</span>
    <span class="head-actions">
      <button id="reset" type="button" class="ghost" title="Descartar cambios locales y recargar el JSON del repo" aria-label="Reimportar del repo">↺</button>
      <button id="export" type="button" class="primary">Exportar JSON</button>
    </span>
  </div>
  <div class="chapters" id="chapters" role="tablist" aria-label="Capítulos (modos)"></div>
</header>

<main>
  <section class="intro" id="intro" hidden></section>
  <p class="chapter-desc" id="chapter-desc" hidden></p>
  <div class="variants" id="variants" hidden></div>
  <div class="legend" id="legend"></div>
  <div class="grid" id="grid"></div>
</main>

<script type="module" src="src/main.js"></script>
</body>
</html>
